model_name: xception
pretrained: true
num_classes: 2
dropout: 0.5
input_size: 299

data_root: /kaggle/input/ffpp-c23-full
manipulation: Deepfakes
compression: c23
batch_size: 16
num_epochs: 10
num_frames_train: 32
num_frames_eval: 32
lr: 0.0002
weight_decay: 0.0
scheduler: reduce_on_plateau
